# Même rôle que ../.github/workflows/build-findx-app.yml à la racine du monorepo.
# Ici, Git ne lit pas .github/ sous un sous-dossier : ce fichier sert de source quand
# le dépôt ne contient que le lanceur (dossier findx-app = racine) — copié en .github/
# de ce petit dépôt. Installe pnpm, puis pnpm run build, artefacts dans release/.

name: build-findx-app
on:
  workflow_dispatch: {}
  push:
    tags:
      - "app-v*"

concurrency:
  group: build-findx-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Package FindX
        run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: findx-release-${{ matrix.os }}
          path: release/*
          if-no-files-found: error
